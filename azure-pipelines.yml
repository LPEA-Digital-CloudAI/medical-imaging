              GcpCredRoleset: $(Vault.Roleset)
              Namespace: $(Vault.Namespace)
              RoleId: $(Vault.RoleId)
              SecretId: $(Vault.SecretId)
              HostUri: $(Vault.Address)

          - script: 'docker login -u oauth2accesstoken -p $SA_TOKEN https://$(GCR.Name)'
            displayName: 'Authenticate to Container Registry'
            enabled: true
            env:
              SA_TOKEN: $(VaultOutput.VaultResult)

          - task: Bash@3
            displayName: 'Download Base Debian Image'
            enabled: true
            inputs:
              targetType: 'inline'
              script: |
                docker pull $(GCR.Name)/test_base_py_debian:latest
              
          - task: Bash@3
            displayName: Save Base Debian Image
            enabled: true
            inputs:
              targetType: 'inline'
              script: |
               docker save $(GCR.Name)/test_base_py_debian:latest -o $(System.DefaultWorkingDirectory)/test_base_py_debian.tar
               
          - task: PublishPipelineArtifact@1
            displayName: Publish Base Debian Image to pipeline
            enabled: true
            inputs:
              targetPath: '$(System.DefaultWorkingDirectory)/test_base_py_debian.tar'
              artifact: 'DEBIAN_BASE_IMAGE_ARTIFACT'
              #publishLocation: 'pipeline'
              
  - stage: BuildOrchestrator
