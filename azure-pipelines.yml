variables:
- group: ml-artreg-digital-pathology-p

trigger:
  branches:
    include:
      - azure-pipelines
  paths:
    include:
      - ilm/*
      - pathology/*
stages:
  - stage: PathCheck
    displayName: 'Check for Path Changes'
    jobs:
      - job: CheckPathChanges
        displayName: 'Determine Changed Paths'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - checkout: self
          - script: |
              echo "##[group]Checking for changes in monorepo directories"
              
              # Fetch recent commits
              git fetch --depth=2

              # Get the last two commits
              LAST_COMMIT=$(git rev-parse HEAD)
              PREV_COMMIT=$(git rev-parse HEAD^)

              # Check changes between the latest commit and its parent
              git diff --name-only $PREV_COMMIT $LAST_COMMIT > changes.txt
              echo "Changed files:"
              cat changes.txt

              # Check for changes in specific directories
              if grep -qE '^ilm/' changes.txt; then
                echo "Changes detected in ilm/ directory."
                echo "##vso[task.setvariable variable=ILMChanged;isOutput=true]true"
              else
                echo "No changes in ilm/ directory."
                echo "##vso[task.setvariable variable=ILMChanged;isOutput=true]false"
              fi
              if grep -qE '^pathology/transformation_pipeline/' changes.txt; then
                echo "Changes detected in pathology/transformation_pipeline/ directory."
                echo "##vso[task.setvariable variable=TransformationChanged;isOutput=true]true"
              else
                echo "No changes in pathology/transformation_pipeline/ directory."
                echo "##vso[task.setvariable variable=TransformationChanged;isOutput=true]false"
              fi
              if grep -qE '^pathology/base_docker_images/' changes.txt; then
                echo "Changes detected in pathology/base_docker_images/ directory."
                echo "##vso[task.setvariable variable=BaseImagesChanged;isOutput=true]true"
              else
                echo "No changes in pathology/base_docker_images/ directory."
                echo "##vso[task.setvariable variable=BaseImagesChanged;isOutput=true]true"
              fi
              if grep -qE '^pathology/dicom_proxy/' changes.txt; then
                echo "Changes detected in pathology/dicom_proxy/ directory."
                echo "##vso[task.setvariable variable=DicomProxyChanged;isOutput=true]true"
              else
                echo "No changes in pathology/dicom_proxy/ directory."
                echo "##vso[task.setvariable variable=DicomProxyChanged;isOutput=true]false"
              fi
              if grep -qE '^pathology/orchestrator/' changes.txt; then
                echo "Changes detected in pathology/orchestrator/ directory."
                echo "##vso[task.setvariable variable=OrchestratorChanged;isOutput=true]true"
              else
                echo "No changes in pathology/orchestrator/ directory."
                echo "##vso[task.setvariable variable=OrchestratorChanged;isOutput=true]false"
              fi
              if grep -qE '^pathology/viewer/' changes.txt; then
                echo "Changes detected in pathology/viewer/ directory."
                echo "##vso[task.setvariable variable=ViewerChanged;isOutput=true]true"
              else
                echo "No changes in pathology/viewer/ directory."
                echo "##vso[task.setvariable variable=ViewerChanged;isOutput=true]false"
              fi
              echo "##[endgroup]"
            name: ChangedDirectories
            displayName: 'Detect Path Changes'
            continueOnError: false

  - stage: BuildBaseContainers
    displayName: 'Build Base Images'
    dependsOn: PathCheck    
    condition: and(succeeded(), eq(dependencies.PathCheck.outputs['CheckPathChanges.ChangedDirectories.BaseImagesChanged'], 'true'))
    pool:
      vmImage: 'ubuntu-latest'
    jobs:
      - job: BuildDebianBase
        displayName: 'Build Base Docker Images'
        steps:
          - task: Docker@2
            displayName: 'Build Debian Base Image'            
            inputs:
              repository: '$(GCR.Name)/test_base_py_debian'
              command: build
              Dockerfile: pathology/base_docker_images/base_py_debian_docker/Dockerfile
              tags: 'latest'
      
          - task: Bash@3
            displayName: Save Debian Base Image
            enabled: true
            inputs:
              targetType: 'inline'
              script: |
               docker save $(GCR.Name)/test_base_py_debian:latest -o $(System.DefaultWorkingDirectory)/base_py_debian.tar

          - task: PublishPipelineArtifact@1
            displayName: Publish Debian Base Image to pipeline
            enabled: false
            inputs:
              targetPath: '$(System.DefaultWorkingDirectory)/base_py_debian.tar'
              artifact: 'DEBIAN_BASE_IMAGE_ARTIFACT'
                
          - task: Docker@2
            displayName: 'Build OpenCV Base Image'
            enabled: true
            inputs:
              repository: '$(GCR.Name)/test_base_py_opencv'
              command: build
              Dockerfile: pathology/base_docker_images/base_py_opencv_docker/Dockerfile
              tags: 'latest'
              arguments: '--build-arg BASE_CONTAINER=$(GCR.Name)/test_base_py_debian:latest'

          - task: Bash@3
            displayName: Save OpenCV Base Image
            enabled: true
            inputs:
              targetType: 'inline'
              script: |
               docker save $(GCR.Name)/test_base_py_opencv:latest -o $(System.DefaultWorkingDirectory)/base_py_opencv.tar

          - task: PublishPipelineArtifact@1
            displayName: Publish OpenCV Base Docker to pipeline
            enabled: true
            inputs:
              targetPath: '$(System.DefaultWorkingDirectory)/base_py_opencv.tar'
              artifact: 'OpenCV_BASE_IMAGE_ARTIFACT'

          - task: Docker@2
            displayName: 'Build Transformation Base Image'
            enabled: true
            inputs:
              repository: '$(GCR.Name)/test_base_transformation'
              command: build
              Dockerfile: pathology/base_docker_images/base_transformation_docker/Dockerfile
              tags: 'latest'
              arguments: '--build-arg BASE_CONTAINER=$(GCR.Name)/test_base_py_opencv:latest'
              
          - task: Bash@3
            displayName: Save Transformation Base Image
            enabled: true
            inputs:
              targetType: 'inline'
              script: |
               docker save $(GCR.Name)/test_base_transformation:latest -o $(System.DefaultWorkingDirectory)/base_transformation.tar

          - task: PublishPipelineArtifact@1
            displayName: Publish Transformation Base Docker to pipeline
            enabled: true
            inputs:
              targetPath: '$(System.DefaultWorkingDirectory)/base_transformation.tar'
              artifact: 'TRANSFORMATION_BASE_IMAGE_ARTIFACT'

              
  - stage: PublishBaseContainers
    displayName: 'Publish Base Artifacts to Registry'
    dependsOn:
      - BuildBaseContainers
      - PathCheck
    condition: and(succeeded(), eq(dependencies.BuildBaseContainers.result, 'succeeded'), eq(dependencies.PathCheck.outputs['CheckPathChanges.ChangedDirectories.BaseImagesChanged'], 'true'))
    pool:
      name: MCC Applications
    jobs:
      - job: MCCPublishILMArtifact
        steps:            
          - checkout: none

          - task: DownloadPipelineArtifact@2
            displayName: 'Download Base Image'
            enabled: false
            inputs:
              buildType: 'current'
              artifactName: 'DEBIAN_BASE_IMAGE_ARTIFACT'
              targetPath: '$(System.DefaultWorkingDirectory)'
              
          - task: Bash@3
            displayName: 'Load Base Debian Image'
            enabled: false
            inputs:
              targetType: 'inline'
              script: |      
                docker load --input $(System.DefaultWorkingDirectory)/base_py_debian.tar
                docker tag $(GCR.Name)/test_base_py_debian:latest $(GCR.Name)/test_base_py_debian:latest   
                
          - task: PrismaCloud.build-release-task.custom-build-release-task.prisma-cloud-compute-scan@3
            displayName: 'Prisma Scan Base Debian Image'
            enabled: false
            inputs:
              twistlockService: 'Prisma Compute'
              artifact: '$(GCR.Name)/test_base_py_debian:latest'
            continueOnError: false  # Fail the job if Prisma scan fails

          - task: DownloadPipelineArtifact@2
            displayName: 'Download OpenCV Base Image'
            enabled: true
            inputs:
              buildType: 'current'
              artifactName: 'OpenCV_BASE_IMAGE_ARTIFACT'
              targetPath: '$(System.DefaultWorkingDirectory)' 

          - task: Bash@3
            displayName: 'Load OpenCV Base Image'
            enabled: true
            inputs:
              targetType: 'inline'
              script: |      
                docker load --input $(System.DefaultWorkingDirectory)/base_py_opencv.tar
                docker tag $(GCR.Name)/test_base_py_opencv:latest $(GCR.Name)/test_base_py_opencv:latest   
                
          - task: PrismaCloud.build-release-task.custom-build-release-task.prisma-cloud-compute-scan@3
            displayName: 'Prisma Scan OPEN CV Image'
            enabled: true
            inputs:
              twistlockService: 'Prisma Compute'
              artifact: '$(GCR.Name)/test_base_py_opencv:latest'
            continueOnError: false  # Fail the job if Prisma scan fails

          - task: DownloadPipelineArtifact@2
            displayName: 'Download Transformation Base Image'
            enabled: true
            inputs:
              buildType: 'current'
              artifactName: 'TRANSFORMATION_BASE_IMAGE_ARTIFACT'
              targetPath: '$(System.DefaultWorkingDirectory)'
              
          - task: Bash@3
            displayName: 'Load Transformation Base Image'
            enabled: true
            inputs:
              targetType: 'inline'
              script: |      
                docker load --input $(System.DefaultWorkingDirectory)/base_transformation.tar
                docker tag $(GCR.Name)/test_base_transformation:latest $(GCR.Name)/test_base_transformation:latest   
                
          - task: PrismaCloud.build-release-task.custom-build-release-task.prisma-cloud-compute-scan@3
            displayName: 'Prisma Scan Base Transformation Image'
            enabled: true
            inputs:
              twistlockService: 'Prisma Compute'
              artifact: '$(GCR.Name)/test_base_transformation:latest'
            continueOnError: false  # Fail the job if Prisma scan fails            
                
          - task: mclm.MCCVaultIntegration.MCCVaultIntegration.MCCVaultIntegration@1
            name: VaultOutput
            displayName: 'MCC Vault Integration'
            enabled: true
            inputs:
              vaultActionType: 'gcpCreds'
              gcpSecretType: 'token'
              GcpCredRoleset: $(Vault.Roleset)
              Namespace: $(Vault.Namespace)
              RoleId: $(Vault.RoleId)
              SecretId: $(Vault.SecretId)
              HostUri: $(Vault.Address)

          - script: 'docker login -u oauth2accesstoken -p $SA_TOKEN https://$(GCR.Name)'
            displayName: 'Authenticate to Container Registry'
            enabled: true
            env:
              SA_TOKEN: $(VaultOutput.VaultResult)

          - task: Docker@2
            displayName: 'Publish Base Debian Image'
            enabled: true
            inputs:
              repository: '$(GCR.Name)/test_base_py_debian'
              command: push
              tags: 'latest' 
                
          - task: Docker@2
            displayName: 'Publish OpenCV Image'
            enabled: true
            inputs:
              repository: '$(GCR.Name)/test_base_py_opencv'
              command: push
              tags: 'latest'   

          - task: Docker@2
            displayName: 'Publish Transformation Base Image'
            enabled: true
            inputs:
              repository: '$(GCR.Name)/test_base_transformation'
              command: push
              tags: 'latest'
