    dependsOn:
      - PathCheck
      - DownloadDebianBaseContainer
    condition: and(succeeded(), eq(dependencies.DownloadDebianBaseContainer.result, 'succeeded'), eq(dependencies.PathCheck.outputs['CheckPathChanges.ChangedDirectories.OrchestratorChanged'], 'true'))
    pool:
      name: Azure Pipelines
    jobs:
      - job: BuildOrchestratorImages
        displayName: 'Build Orchestrator Docker Images'
        steps:

          - task: DownloadPipelineArtifact@2
            displayName: 'Download Debian Base Image'
            enabled: true
            inputs:
              buildType: 'current'
              artifactName: 'DEBIAN_BASE_IMAGE_ARTIFACT'
              targetPath: '$(System.DefaultWorkingDirectory)'
              
          - task: Bash@3
            displayName: 'Load Debian Base Image'
            enabled: true
            inputs:
              targetType: 'inline'
              script: |      
                docker load --input $(System.DefaultWorkingDirectory)/test_base_py_debian.tar
                docker tag $(GCR.Name)/test_base_py_debian:latest $(GCR.Name)/test_base_py_debian:latest   
                
          - task: Docker@2
            displayName: 'Build Orchestrator Image'
            enabled: true
            inputs:
              repository: '$(GCR.Name)/test_orchestrator'
              command: build
              Dockerfile: pathology/orchestrator/rest_server/Dockerfile
              tags: 'latest'
              buildContext: .
              arguments: '--build-arg BASE_CONTAINER=$(GCR.Name)/test_base_py_debian:latest'

          - task: Bash@3
            displayName: Save Docker Image
            enabled: true
            inputs:
              targetType: 'inline'
              script: |
               docker save $(GCR.Name)/test_orchestrator:latest -o $(System.DefaultWorkingDirectory)/image_file.tar
               
          - task: PublishPipelineArtifact@1
            enabled: true
            inputs:
              targetPath: '$(System.DefaultWorkingDirectory)/image_file.tar'
              artifact: 'IMAGE_ARTIFACT'
              #publishLocation: 'pipeline'
              
  - stage: PublishOrchestratorArtifact
    displayName: 'Publish Orchestrator Artifact to Registry'
    dependsOn:
      - BuildOrchestrator
      - PathCheck
    condition: and(succeeded(), eq(dependencies.BuildOrchestrator.result, 'succeeded'), eq(dependencies.PathCheck.outputs['CheckPathChanges.ChangedDirectories.OrchestratorChanged'], 'true'))
    pool:
      name: MCC Applications
    jobs:
      - job: MCCPublishOrchestratorArtifact
        steps:
          - checkout: none
          
          - task: DownloadPipelineArtifact@2
            enabled: true
            inputs:
              buildType: 'current'
              artifactName: 'IMAGE_ARTIFACT'
              targetPath: '$(System.DefaultWorkingDirectory)'

          - task: Bash@3
            enabled: true
            displayName: 'Load Docker Image'
            inputs:
              targetType: 'inline'
              script: |      
                docker load --input $(System.DefaultWorkingDirectory)/image_file.tar
                docker tag $(GCR.Name)/test_orchestrator:latest $(GCR.Name)/test_orchestrator:latest      

          - task: mclm.MCCVaultIntegration.MCCVaultIntegration.MCCVaultIntegration@1
            name: VaultOutput
            displayName: 'MCC Vault Integration'
            enabled: true
            inputs:
              vaultActionType: 'gcpCreds'
              gcpSecretType: 'token'
              GcpCredRoleset: $(Vault.Roleset)
              Namespace: $(Vault.Namespace)
              RoleId: $(Vault.RoleId)
              SecretId: $(Vault.SecretId)
              HostUri: $(Vault.Address)

          - script: 'docker login -u oauth2accesstoken -p $SA_TOKEN https://$(GCR.Name)'
            displayName: 'Authenticate to Container Registry'
            enabled: true
            env:
              SA_TOKEN: $(VaultOutput.VaultResult)              

          - task: PrismaCloud.build-release-task.custom-build-release-task.prisma-cloud-compute-scan@3
            displayName: 'Prisma Scan Orchestrator Images'
            enabled: true
            inputs:
              twistlockService: 'Prisma Compute'
              artifact: '$(GCR.Name)/test_orchestrator:latest'
            continueOnError: false  # Fail the job if Prisma scan fails

          - task: Docker@2
            displayName: 'Publish Container Image'
            enabled: true
            inputs:
              repository: '$(GCR.Name)/test_orchestrator'
              command: push
              tags: 'latest'
              
  - stage: DownloadOpenCVBaseContainer
    displayName: 'Download containers using MCC Application pool'
    condition: and(succeeded(), eq(dependencies.PathCheck.outputs['CheckPathChanges.ChangedDirectories.DicomProxyChanged'], 'true'))
    dependsOn: PathCheck
    pool:
      name: MCC Applications
    jobs:
      - job: MCCPublishOpenCVBaseContainerArtifact
        steps:
          - checkout: none
          - task: mclm.MCCVaultIntegration.MCCVaultIntegration.MCCVaultIntegration@1
            name: VaultOutput
            displayName: 'MCC Vault Integration'
            enabled: true
            inputs:
              vaultActionType: 'gcpCreds'
              gcpSecretType: 'token'
              GcpCredRoleset: $(Vault.Roleset)
              Namespace: $(Vault.Namespace)
              RoleId: $(Vault.RoleId)
              SecretId: $(Vault.SecretId)
              HostUri: $(Vault.Address)

          - script: 'docker login -u oauth2accesstoken -p $SA_TOKEN https://$(GCR.Name)'
            displayName: 'Authenticate to Container Registry'
            enabled: true
            env:
              SA_TOKEN: $(VaultOutput.VaultResult)

          - task: Bash@3
            displayName: 'Download Open CV Base Image'
            enabled: true
            inputs:
              targetType: 'inline'
              script: |
                docker pull $(GCR.Name)/test_base_py_opencv:latest
              
          - task: Bash@3
            displayName: Save Base Debian Image
            enabled: true
            inputs:
              targetType: 'inline'
              script: |
               docker save $(GCR.Name)/test_base_py_opencv:latest -o $(System.DefaultWorkingDirectory)/test_base_py_opencv.tar
               
          - task: PublishPipelineArtifact@1
            displayName: Publish Base Debian Image to pipeline
            enabled: true
            inputs:
              targetPath: '$(System.DefaultWorkingDirectory)/test_base_py_opencv.tar'
              artifact: 'OPENCV_BASE_IMAGE_ARTIFACT'
              
  - stage: BuildDicomProxy
    displayName: 'Build DicomProxy Images'
    dependsOn:
      - PathCheck
      - DownloadOpenCVBaseContainer
    condition: and(succeeded(), eq(dependencies.DownloadOpenCVBaseContainer.result, 'succeeded'), eq(dependencies.PathCheck.outputs['CheckPathChanges.ChangedDirectories.DicomProxyChanged'], 'true'))
    pool:
      name: Azure Pipelines
    jobs:
      - job: BuildDicomProxyImages
        displayName: 'Build DicomProxy Docker Images'
        steps:

          - task: DownloadPipelineArtifact@2
            displayName: 'Download Open CV Base Image'
            enabled: true
            inputs:
              buildType: 'current'
              artifactName: 'OPENCV_BASE_IMAGE_ARTIFACT'
              targetPath: '$(System.DefaultWorkingDirectory)'
              
          - task: Bash@3
            displayName: 'Load Open CV  Base Image'
            enabled: true
            inputs:
              targetType: 'inline'
              script: |      
                docker load --input $(System.DefaultWorkingDirectory)/test_base_py_opencv.tar
                docker tag $(GCR.Name)/test_base_py_opencv:latest $(GCR.Name)/test_base_py_opencv:latest   
                
          - task: Docker@2
            displayName: 'Build DicomProxy Image'
            enabled: true
            inputs:
              repository: '$(GCR.Name)/test_dicom_proxy'
              command: build
              Dockerfile: pathology/dicom_proxy/Dockerfile
              tags: 'latest'
              buildContext: .
              arguments: '--build-arg BASE_CONTAINER=$(GCR.Name)/test_base_py_opencv:latest'

          - task: Bash@3
            displayName: Save Docker Image
            enabled: true
            inputs:
              targetType: 'inline'
              script: |
               docker save $(GCR.Name)/test_dicom_proxy:latest -o $(System.DefaultWorkingDirectory)/dicom_proxy_image.tar
               
          - task: PublishPipelineArtifact@1
            enabled: true
            inputs:
              targetPath: '$(System.DefaultWorkingDirectory)/dicom_proxy_image.tar'
              artifact: 'IMAGE_ARTIFACT'
              #publishLocation: 'pipeline'
              
  - stage: PublishDicomProxyArtifact
    displayName: 'Publish DicomProxy Artifact to Registry'
    dependsOn:
      - BuildDicomProxy
      - PathCheck
    condition: and(succeeded(), eq(dependencies.BuildDicomProxy.result, 'succeeded'), eq(dependencies.PathCheck.outputs['CheckPathChanges.ChangedDirectories.DicomProxyChanged'], 'true'))
    pool:
      name: MCC Applications
    jobs:
      - job: MCCPublishDicomProxyArtifact
        steps:
          - checkout: none
          
          - task: DownloadPipelineArtifact@2
            enabled: true
            inputs:
              buildType: 'current'
              artifactName: 'IMAGE_ARTIFACT'
              targetPath: '$(System.DefaultWorkingDirectory)'

          - task: Bash@3
            enabled: true
            displayName: 'Load Docker Image'
            inputs:
              targetType: 'inline'
              script: |      
                docker load --input $(System.DefaultWorkingDirectory)/dicom_proxy_image.tar
                docker tag $(GCR.Name)/test_dicom_proxy:latest $(GCR.Name)/test_dicom_proxy:latest      

          - task: mclm.MCCVaultIntegration.MCCVaultIntegration.MCCVaultIntegration@1
            name: VaultOutput
            displayName: 'MCC Vault Integration'
            enabled: true
            inputs:
              vaultActionType: 'gcpCreds'
              gcpSecretType: 'token'
              GcpCredRoleset: $(Vault.Roleset)
              Namespace: $(Vault.Namespace)
              RoleId: $(Vault.RoleId)
              SecretId: $(Vault.SecretId)
              HostUri: $(Vault.Address)

          - script: 'docker login -u oauth2accesstoken -p $SA_TOKEN https://$(GCR.Name)'
            displayName: 'Authenticate to Container Registry'
            enabled: true
            env:
              SA_TOKEN: $(VaultOutput.VaultResult)              

          - task: PrismaCloud.build-release-task.custom-build-release-task.prisma-cloud-compute-scan@3
            displayName: 'Prisma Scan DicomProxy Images'
            enabled: true
            inputs:
              twistlockService: 'Prisma Compute'
              artifact: '$(GCR.Name)/test_dicom_proxy:latest'
            continueOnError: false  # Fail the job if Prisma scan fails

          - task: Docker@2
            displayName: 'Publish Container Image'
            enabled: true
            inputs:
              repository: '$(GCR.Name)/test_dicom_proxy'
              command: push
              tags: 'latest'
